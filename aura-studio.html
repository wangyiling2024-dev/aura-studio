  button:focus, input:focus, textarea:focus, select:focus { outline: none; }

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function Card({ children, style={}, onClick }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={()=>onClick&&setHovered(true)}
      onMouseLeave={()=>setHovered(false)}
      style={{
        background:"rgba(255,255,255,0.75)",
        backdropFilter:"blur(14px)",
        borderRadius:20,
        border:"1px solid rgba(210,195,185,0.35)",
        boxShadow: hovered && onClick ? "0 8px 32px rgba(180,155,140,0.16)" : "0 2px 20px rgba(180,155,140,0.07)",
        padding:24,
        cursor: onClick ? "pointer" : "default",
        transform: hovered && onClick ? "translateY(-2px)" : "none",
        transition:"box-shadow 0.2s, transform 0.2s",
        animation:"fadeUp 0.3s ease",
        ...style,
      }}
    >{children}</div>
  );
}

function Tag({ label, variant="neutral" }) {
  const C = { viral:{bg:"#f5e6e8",color:"#c4606e",border:"#e8c4ca"}, rising:{bg:"#e8f0e6",color:"#5a8c52",border:"#c4dcc0"}, saturated:{bg:"#f0ede8",color:"#8c7a62",border:"#dcd0c4"}, neutral:{bg:"#f4f0ec",color:"#9c8c7c",border:"#e4dcd4"} };
  const c = C[variant]||C.neutral;
  return <span style={{display:"inline-block",padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",background:c.bg,color:c.color,border:`1px solid ${c.border}`}}>{label}</span>;
}

function Bar({ value, max=100 }) {
  return (
    <div style={{background:"#f0ece8",borderRadius:99,height:6,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:99,width:`${(value/max)*100}%`,background:value>85?"linear-gradient(90deg,#d4a0a0,#e8b4b4)":value>70?"linear-gradient(90deg,#c4b48c,#d8c8a0)":"linear-gradient(90deg,#b8c8b8,#c8d8c0)",transition:"width 1s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

function Spinner() {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,color:"#b09080"}}>
      <div style={{width:15,height:15,border:"2px solid #e8dcd4",borderTopColor:"#c4988c",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <span style={{fontSize:13}}>Generating with AI…</span>
    </div>
  );
}

const inputBase = {width:"100%",padding:"12px 16px",borderRadius:14,border:"1px solid rgba(210,195,185,0.5)",background:"rgba(255,253,250,0.9)",fontSize:14,color:"#3a2e28",outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box"};

function PrimaryBtn({ children, onClick, disabled, style={} }) {
  const [h,setH]=useState(false);
  return <button disabled={disabled} onClick={onClick} onMouseEnter={()=>!disabled&&setH(true)} onMouseLeave={()=>setH(false)} style={{padding:"13px 24px",borderRadius:14,fontSize:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",background:disabled?"rgba(210,195,185,0.4)":"linear-gradient(135deg,#c4988c,#d4a89c,#c8a0b4)",color:disabled?"#b0a090":"#fff",border:"none",boxShadow:disabled?"none":h?"0 6px 24px rgba(196,152,140,0.45)":"0 4px 18px rgba(196,152,140,0.35)",transform:h&&!disabled?"translateY(-1px)":"none",transition:"all 0.18s",...style}}>{children}</button>;
}

// ─── PAGES ───────────────────────────────────────────────────────────────────

  const h = new Date().getHours();
  const greet = h<12?"Good morning":h<17?"Good afternoon":"Good evening";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:28}}>
      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,#fdf6f0 0%,#f8ede8 50%,#f4e8f2 100%)",borderRadius:24,padding:"38px 44px",position:"relative",overflow:"hidden",border:"1px solid rgba(210,185,175,0.3)"}}>
        <div style={{position:"absolute",top:-50,right:-50,width:240,height:240,borderRadius:"50%",background:"rgba(220,195,185,0.15)"}}/>
        <div style={{position:"absolute",bottom:-30,left:260,width:150,height:150,borderRadius:"50%",background:"rgba(195,185,220,0.1)"}}/>
        <div style={{position:"absolute",top:20,right:60,width:80,height:80,borderRadius:"50%",background:"rgba(200,160,180,0.1)"}}/>
        <p style={{fontSize:12,fontWeight:600,color:"#b09080",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{greet}, Sophia ✦</p>
        <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:38,color:"#3a2e28",margin:0,lineHeight:1.2}}>What's your story<br/><em style={{color:"#c4988c"}}>this week?</em></h1>
        <p style={{color:"#9c8c7c",marginTop:14,fontSize:15,maxWidth:480,lineHeight:1.7}}>You have 3 posts to schedule, 2 trending topics in your niche, and an AI waiting to help you create something beautiful.</p>
        <div style={{display:"flex",gap:12,marginTop:22,flexWrap:"wrap"}}>
          {[{l:"Create a caption",p:"captions",primary:true},{l:"Find trending ideas",p:"trends",primary:false},{l:"Open calendar",p:"calendar",primary:false}].map(b=>(
            <button key={b.l} onClick={()=>setPage(b.p)} style={{padding:"11px 22px",borderRadius:99,fontSize:13,fontWeight:600,background:b.primary?"linear-gradient(135deg,#c4988c,#d4a89c)":"rgba(255,255,255,0.75)",color:b.primary?"#fff":"#7c6860",border:b.primary?"none":"1px solid rgba(200,180,170,0.5)",cursor:"pointer",boxShadow:b.primary?"0 4px 16px rgba(196,152,140,0.3)":"none",transition:"transform 0.15s"}}>{b.l}</button>
          ))}
        </div>
      </div>

      {/* Stats */}

        {MOCK_ANALYTICS.map(a=>(
          <Card key={a.label} style={{padding:22,textAlign:"center"}}>
            <p style={{fontSize:11,color:"#b09880",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",margin:"0 0 8px"}}>{a.label}</p>
            <p style={{fontSize:28,fontWeight:700,color:"#3a2e28",margin:"0 0 5px",fontFamily:"'DM Serif Display',serif"}}>{a.value}</p>
            <span style={{fontSize:12,color:a.up?"#6a9c60":"#c48068",fontWeight:600}}>{a.change} this week</span>
          </Card>
        ))}
      </div>

      {/* 2 col */}
      <div style={{display:"grid",gridTemplateColumns:"1.6fr 1fr",gap:20}}>
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:"#3a2e28",margin:0}}>Trending right now</h3>
            <button onClick={()=>setPage("trends")} style={{fontSize:12,color:"#c4988c",fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>See all →</button>

function CaptionStudio() {
  const [form, setForm] = useState({niche:"",platform:"Instagram",tone:"relatable",topic:"",audience:""});
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const platforms = ["Instagram","TikTok","LinkedIn","YouTube","Pinterest"];
  const tones = ["luxury","relatable","genz","professional"];
  const toneLabels = {luxury:"Luxury ✨",relatable:"Relatable 💬",genz:"Gen Z 🔥",professional:"Professional 💼"};

  async function generate() {
    if (!form.topic) return;
    setLoading(true); setResults(null);
    const prompt = `You are a social media copywriter. Generate 4 captions for:\nPlatform: ${form.platform}\nNiche: ${form.niche||"lifestyle"}\nTone: ${form.tone}\nTopic: ${form.topic}\nTarget audience: ${form.audience||"general audience"}\n\nReturn ONLY JSON: {"captions":["c1","c2","c3","c4"],"ctas":["cta1","cta2"],"hashtags":["#h1","#h2","#h3","#h4","#h5"]}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data = await res.json();
      const text = data.content.map(b=>b.text||"").join("");
      setResults(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch {
      setResults({captions:MOCK_CAPTIONS[form.tone]||MOCK_CAPTIONS.relatable,ctas:["Drop a comment below 👇","Save this for later ✨"],hashtags:["#contentcreator","#socialmedia","#aesthetic","#creative","#growthhack"]});
    }
    setLoading(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      <div>
        <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:32,color:"#3a2e28",margin:"0 0 6px"}}>Caption Studio</h2>
        <p style={{color:"#9c8c7c",fontSize:15,margin:0}}>Turn your raw idea into scroll-stopping copy in seconds.</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>
        <Card>
          <h3 style={{fontFamily:"'DM Serif Display',serif",fontSize:19,color:"#3a2e28",margin:"0 0 20px"}}>Tell me about your post</h3>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>What's the post about? *</label>
              <textarea value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})} placeholder="e.g. My new morning routine, launching my Etsy shop, 3 lessons from my first year…" style={{...inputBase,height:90,resize:"none",lineHeight:1.7}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>Platform</label>
                <select value={form.platform} onChange={e=>setForm({...form,platform:e.target.value})} style={{...inputBase}}>{platforms.map(p=><option key={p}>{p}</option>)}</select>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>Niche</label>
                <input value={form.niche} onChange={e=>setForm({...form,niche:e.target.value})} placeholder="e.g. wellness, finance…" style={{...inputBase}}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:8}}>Tone</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {tones.map(t=>(
                  <button key={t} onClick={()=>setForm({...form,tone:t})} style={{padding:"8px 16px",borderRadius:99,fontSize:13,fontWeight:500,cursor:"pointer",background:form.tone===t?"linear-gradient(135deg,#c4988c,#d4a89c)":"rgba(245,240,235,0.9)",color:form.tone===t?"#fff":"#7c6860",border:form.tone===t?"none":"1px solid rgba(200,180,170,0.4)",boxShadow:form.tone===t?"0 2px 12px rgba(196,152,140,0.3)":"none"}}>{toneLabels[t]}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>Target Audience</label>
              <input value={form.audience} onChange={e=>setForm({...form,audience:e.target.value})} placeholder="e.g. women 25-35, small business owners, students…" style={{...inputBase}}/>
            </div>
            <PrimaryBtn onClick={generate} disabled={loading||!form.topic} style={{width:"100%"}}>
              {loading?"Generating your captions…":"✦ Generate captions"}
            </PrimaryBtn>
            {loading && <Spinner/>}
          </div>
        </Card>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {results ? (
            <>
              {results.captions.map((cap,i)=>(
                <Card key={i} style={{padding:18}}>
                  <p style={{margin:"0 0 10px",fontSize:14,color:"#4a3c34",lineHeight:1.75}}>{cap}</p>
                  <button onClick={()=>navigator.clipboard?.writeText(cap)} style={{fontSize:11,color:"#c4988c",fontWeight:600,background:"none",border:"none",cursor:"pointer",padding:0}}>Copy ↗</button>
                </Card>
              ))}
              <Card style={{padding:18}}>
                <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase"}}>Suggested CTAs</p>
                {results.ctas?.map((cta,i)=><p key={i} style={{margin:"4px 0",fontSize:14,color:"#4a3c34"}}>→ {cta}</p>)}
              </Card>
              <Card style={{padding:18}}>
                <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#b09880",letterSpacing:"0.07em",textTransform:"uppercase"}}>Hashtags</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {results.hashtags?.map((h,i)=><span key={i} style={{background:"#f4ece8",color:"#9c7060",border:"1px solid #e8dcd4",borderRadius:99,padding:"4px 12px",fontSize:12,fontWeight:500}}>{h}</span>)}
                </div>
              </Card>
            </>

// ─── AI CHAT WIDGET ──────────────────────────────────────────────────────────
function AIChatWidget({ open, setOpen }) {
  const [msgs, setMsgs] = useState([{role:"assistant",text:"Hey! ✨ I'm your content assistant. Ask me anything — caption help, post ideas, trending topics, strategy advice…"}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  async function send() {
    if (!input.trim()||loading) return;
    const userMsg = input.trim(); setInput(""); setLoading(true);
    setMsgs(prev=>[...prev,{role:"user",text:userMsg}]);
    try {
      const history = msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:"You are a friendly, expert social media content strategist. Be concise, warm, and practical. Never be robotic.",messages:[...history,{role:"user",content:userMsg}]})});
      const data = await res.json();
      setMsgs(prev=>[...prev,{role:"assistant",text:data.content.map(b=>b.text||"").join("")}]);
    } catch {
      setMsgs(prev=>[...prev,{role:"assistant",text:"Hmm, I had trouble connecting. Try again in a moment?"}]);
    }
    setLoading(false);
  }

  if (!open) return (
    <button onClick={()=>setOpen(true)} title="Open AI Assistant" style={{position:"fixed",bottom:28,right:28,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#c4988c,#d4a89c,#c8a0b4)",border:"none",cursor:"pointer",fontSize:20,boxShadow:"0 4px 24px rgba(196,152,140,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,transition:"transform 0.2s, box-shadow 0.2s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.1)";e.currentTarget.style.boxShadow="0 6px 28px rgba(196,152,140,0.6)";}}
      onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 4px 24px rgba(196,152,140,0.5)";}}>
      ✦
    </button>
  );

  return (
    <div style={{position:"fixed",bottom:28,right:28,width:340,height:490,borderRadius:22,background:"rgba(255,252,248,0.97)",backdropFilter:"blur(20px)",border:"1px solid rgba(210,195,185,0.4)",boxShadow:"0 8px 50px rgba(180,155,140,0.22)",display:"flex",flexDirection:"column",zIndex:200,overflow:"hidden"}}>
      <div style={{padding:"15px 18px",borderBottom:"1px solid rgba(210,195,185,0.3)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(135deg,rgba(252,245,238,0.95),rgba(248,238,245,0.95))"}}>
        <div>
          <p style={{margin:0,fontSize:14,fontWeight:700,color:"#3a2e28"}}>AI Assistant ✦</p>
          <p style={{margin:0,fontSize:11,color:"#b09880"}}>Always on, always helpful</p>
        </div>
        <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#9c8c7c",lineHeight:1}}>×</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"82%",padding:"10px 14px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?"linear-gradient(135deg,#c4988c,#d4a89c)":"rgba(245,240,235,0.95)",color:m.role==="user"?"#fff":"#3a2e28",fontSize:13,lineHeight:1.65,border:m.role==="user"?"none":"1px solid rgba(210,195,185,0.3)",animation:"fadeUp 0.2s ease"}}>{m.text}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"rgba(245,240,235,0.95)",border:"1px solid rgba(210,195,185,0.3)",borderRadius:"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,color:"#9c8c7c",animation:"pulse 1s infinite"}}>typing…</div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:12,borderTop:"1px solid rgba(210,195,185,0.28)",display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask me anything…" style={{flex:1,padding:"10px 16px",borderRadius:99,border:"1px solid rgba(210,195,185,0.45)",background:"rgba(255,253,250,0.95)",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif",color:"#3a2e28"}}/>
        <button onClick={send} style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#c4988c,#d4a89c)",border:"none",cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>→</button>
      </div>
    </div>
  );
}
